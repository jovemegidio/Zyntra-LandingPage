<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Zyntra - Sistema de Gestão Empresarial</title>
    <meta name="description" content="Acesse sua conta Zyntra. Sistema de gestão empresarial 100% na nuvem.">
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="Favicon - Zyntra.png">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6C5CE7;
            --primary-dark: #5A4BD1;
            --primary-light: #A29BFE;
            --secondary: #00B894;
            --dark: #0A0A1A;
            --dark-2: #12122A;
            --dark-3: #1A1A3A;
            --gray-500: #7878a0;
            --gray-400: #9a9ac0;
            --gray-200: #e0e0ee;
            --gray-100: #f0f0f8;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background pattern */
        body::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(108, 92, 231, 0.12) 0%, transparent 70%);
            top: -300px;
            right: -300px;
            pointer-events: none;
            z-index: 0;
            animation: bgFloat 15s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 184, 148, 0.08) 0%, transparent 70%);
            bottom: -250px;
            left: -250px;
            pointer-events: none;
            z-index: 0;
            animation: bgFloat 18s ease-in-out infinite reverse;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 15px) scale(0.95); }
        }

        /* Grid pattern overlay */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(108, 92, 231, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108, 92, 231, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: linear-gradient(165deg, rgba(26, 26, 58, 0.9), rgba(18, 18, 42, 0.95));
            border: 1px solid rgba(108, 92, 231, 0.1);
            border-radius: 24px;
            padding: 44px 36px 36px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 20px 50px rgba(0,0,0,0.5),
                0 0 100px rgba(108, 92, 231, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: cardAppear 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo a {
            display: inline-flex;
            align-items: center;
            gap: 0;
            transition: transform 0.3s ease;
        }

        .login-logo a:hover {
            transform: scale(1.05);
        }

        .login-logo img {
            height: 34px;
            width: auto;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-title {
            text-align: center;
            margin-bottom: 6px;
            font-size: 22px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.02em;
        }

        .login-subtitle {
            text-align: center;
            font-size: 14px;
            color: var(--gray-500);
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-400);
            margin-bottom: 6px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            color: var(--white);
            transition: all 0.25s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
            font-weight: 400;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: rgba(108, 92, 231, 0.05);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.12), 0 0 20px rgba(108, 92, 231, 0.06);
        }

        .form-group input:hover:not(:focus) {
            border-color: rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.04);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            padding-right: 48px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray-500);
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
            border-radius: 8px;
            transition: all 0.25s ease;
        }

        .toggle-password:hover {
            color: var(--primary-light);
            background: rgba(108, 92, 231, 0.1);
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 12px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
            border-radius: 4px;
        }

        .remember-me span {
            font-size: 13px;
            color: var(--gray-500);
            user-select: none;
        }

        .forgot-password {
            font-size: 13px;
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .forgot-password:hover {
            color: var(--white);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.45);
        }

        .btn-login:hover::before {
            opacity: 1;
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(108, 92, 231, 0.3);
        }

        .btn-login.loading {
            pointer-events: none;
            opacity: 0.85;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
            color: var(--gray-500);
        }

        .login-footer a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .login-footer a:hover {
            color: var(--white);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            text-align: center;
            animation: cardAppear 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        .back-link a {
            font-size: 13px;
            color: var(--gray-500);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 10px;
            transition: all 0.25s ease;
        }

        .back-link a:hover {
            color: var(--primary-light);
            background: rgba(108, 92, 231, 0.08);
        }

        /* Error message */
        .form-error {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 11px 14px;
            background: rgba(225, 112, 85, 0.08);
            border: 1px solid rgba(225, 112, 85, 0.15);
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 13px;
            color: #E17055;
            animation: shakeError 0.4s ease;
        }

        .form-error.visible {
            display: flex;
        }

        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Spinner */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spin { animation: spin 1s linear infinite; }

        /* Focus outline for accessibility */
        .toggle-password:focus-visible,
        .btn-login:focus-visible,
        .forgot-password:focus-visible,
        .back-link a:focus-visible {
            outline: 2px solid var(--primary-light);
            outline-offset: 2px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .login-card {
                padding: 32px 24px 28px;
                border-radius: 20px;
            }

            .login-title {
                font-size: 20px;
            }

            .login-subtitle {
                font-size: 13px;
            }

            .form-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }

        @media (max-width: 360px) {
            .login-card {
                padding: 28px 20px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <a href="index.html">
                    <img src="Zyntra - Branco.png" alt="Zyntra">
                </a>
            </div>

            <div class="login-header">
                <h1 class="login-title">Bem-vindo de volta</h1>
                <p class="login-subtitle">Acesse sua conta para gerenciar seu negócio</p>
            </div>

            <div class="form-error" id="formError">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span id="errorText">E-mail ou senha incorretos.</span>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Sua senha" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar senha">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember" id="remember">
                        <span>Lembrar de mim</span>
                    </label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    Entrar
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>

            <div class="login-footer">
                Não tem uma conta? <a href="index.html#precos">Teste grátis por 7 dias</a>
            </div>
        </div>

        <div class="back-link">
            <a href="index.html">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Voltar ao site
            </a>
        </div>
    </div>

    <script>
        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.innerHTML = isPassword
                ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
                : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        });

        // Form submit
        const loginForm = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const formError = document.getElementById('formError');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Basic validation
            if (!email || !password) {
                formError.classList.add('visible');
                document.getElementById('errorText').textContent = 'Preencha todos os campos.';
                return;
            }

            if (!email.includes('@')) {
                formError.classList.add('visible');
                document.getElementById('errorText').textContent = 'Digite um e-mail válido.';
                return;
            }

            formError.classList.remove('visible');

            // Loading state
            btnLogin.classList.add('loading');
            btnLogin.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin">
                    <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                </svg>
                Entrando...
            `;

            // Simulate login (replace with real auth)
            setTimeout(() => {
                // For demo: show error. In production, redirect to dashboard
                formError.classList.add('visible');
                document.getElementById('errorText').textContent = 'E-mail ou senha incorretos. Tente novamente.';

                btnLogin.classList.remove('loading');
                btnLogin.innerHTML = `
                    Entrar
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                `;
            }, 1500);
        });

        // Hide error on input
        document.querySelectorAll('#loginForm input').forEach(input => {
            input.addEventListener('input', () => {
                formError.classList.remove('visible');
            });
        });

    </script>
</body>
</html>
